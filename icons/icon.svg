<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1a1a"/>
      <stop offset="100%" style="stop-color:#b20000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Red top bar -->
  <rect x="0" y="0" width="512" height="10" rx="5" fill="url(#red)"/>

  <!-- Big S -->
  <text x="210" y="350"
        font-family="Arial Black, Impact, sans-serif"
        font-size="330" font-weight="900"
        fill="url(#red)" letter-spacing="-10">S</text>

  <!-- IL badge -->
  <rect x="310" y="370" width="120" height="54" rx="10" fill="#e50914"/>
  <text x="370" y="411"
        font-family="Arial, sans-serif"
        font-size="36" font-weight="800"
        fill="#ffffff" text-anchor="middle">IL</text>

  <!-- Subtle play icon overlay -->
  <polygon points="150,430 150,480 195,455" fill="#ffffff" opacity="0.12"/>
  <polygon points="200,430 200,480 245,455" fill="#ffffff" opacity="0.08"/>
</svg>
